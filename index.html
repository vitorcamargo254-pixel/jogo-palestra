<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jornada Interativa - Palestra</title>
  <style>
    :root {
      --bg: #05070f;
      --card: #f4f6f8;
      --primary: #6d28d9;
      --primary-2: #7c3aed;
      --success: #16a34a;
      --warning: #94a3b8;
      --text: #0f172a;
      --line: #d8dde5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at 50% -20%, #1c2032 0%, var(--bg) 50%);
      color: #e5e7eb;
      min-height: 100vh;
    }

    .app {
      width: min(460px, 100%);
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      padding-bottom: 80px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(5, 7, 15, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }

    .coins {
      background: #0b6bd4;
      color: #f8fafc;
      padding: 8px 12px;
      border-radius: 12px;
      font-weight: 700;
      min-width: 92px;
      text-align: center;
    }

    .subtitle {
      padding: 14px 16px 0;
      color: #cbd5e1;
      font-size: 14px;
    }

    .track-wrap {
      position: relative;
      height: 860px;
      margin: 10px 10px 0;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
      border: 1px solid rgba(148, 163, 184, 0.2);
      overflow: hidden;
    }

    .track-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .track-path {
      fill: none;
      stroke: var(--line);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 12 10;
      opacity: 0.92;
    }

    .node {
      position: absolute;
      width: 66px;
      height: 66px;
      border-radius: 999px;
      border: 3px solid #d1d5db;
      background: #f8fafc;
      color: #6b21a8;
      display: grid;
      place-items: center;
      font-size: 30px;
      font-weight: 800;
      cursor: pointer;
      transform: translate(-50%, -50%);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .node:hover { transform: translate(-50%, -50%) scale(1.05); }

    .node.locked {
      filter: grayscale(0.9);
      opacity: 0.8;
      color: #64748b;
      cursor: not-allowed;
    }

    .node.current {
      border-color: #10b981;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.25);
    }

    .node.done {
      border-color: var(--success);
      color: var(--success);
    }

    .status {
      position: absolute;
      top: calc(100% + 5px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
      white-space: nowrap;
    }

    .status.done { background: #16a34a; color: #fff; }
    .status.current { background: #0ea5e9; color: #fff; }
    .status.locked { background: #64748b; color: #fff; }

    .controls {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 12px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: #1f2937; color: #e5e7eb; border: 1px solid #334155; }

    .footer {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(460px, 100%);
      background: rgba(2, 6, 23, 0.98);
      border-top: 1px solid rgba(148, 163, 184, 0.25);
      color: #cbd5e1;
      display: flex;
      justify-content: space-around;
      padding: 8px;
      font-size: 13px;
      gap: 6px;
    }

    .nav-btn {
      flex: 1;
      background: transparent;
      color: #cbd5e1;
      border: 1px solid transparent;
      border-radius: 10px;
      font-weight: 700;
      padding: 8px 6px;
    }

    .nav-btn.active {
      background: #0b6bd4;
      color: #fff;
      border-color: #60a5fa;
    }

    .view {
      display: none;
      padding-bottom: 8px;
    }

    .view.active {
      display: block;
    }

    .panel {
      margin: 10px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 12px;
    }

    .panel h3 {
      margin: 0 0 4px;
      font-size: 18px;
    }

    .panel p {
      margin: 4px 0 0;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.4;
    }

    .prizes-list {
      display: grid;
      gap: 10px;
      margin: 10px;
    }

    .prize-card {
      background: #e2e8f0;
      color: #0f172a;
      border-radius: 12px;
      padding: 10px;
      border: 1px solid #cbd5e1;
    }

    .prize-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .prize-title {
      font-weight: 800;
      font-size: 16px;
    }

    .prize-price {
      background: #0b6bd4;
      color: #fff;
      border-radius: 999px;
      padding: 4px 8px;
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }

    .prize-actions {
      margin-top: 8px;
      display: flex;
      justify-content: flex-end;
    }

    .profile-grid {
      display: grid;
      gap: 10px;
    }

    .profile-grid label {
      font-size: 13px;
      color: #cbd5e1;
      font-weight: 600;
    }

    .profile-grid input, .profile-grid textarea {
      margin-top: 4px;
      width: 100%;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #e2e8f0;
      padding: 10px;
      font: inherit;
    }

    .stats-box {
      margin-top: 10px;
      border-top: 1px dashed rgba(148, 163, 184, 0.4);
      padding-top: 10px;
      display: grid;
      gap: 8px;
      font-size: 14px;
      color: #e2e8f0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.72);
      display: none;
      z-index: 20;
    }

    .modal {
      position: fixed;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: min(460px, 100%);
      background: var(--card);
      color: var(--text);
      border-radius: 20px 20px 0 0;
      max-height: 86vh;
      overflow-y: auto;
      padding: 18px;
      display: none;
      z-index: 21;
    }

    .modal h2 {
      margin: 0 0 10px;
      color: #0b3b63;
      font-size: 32px;
    }

    .modal h3 { margin: 8px 0; font-size: 21px; }
    .modal p { font-size: 22px; line-height: 1.42; margin: 8px 0; }
    .small { font-size: 19px; color: #334155; }

    textarea, input[type="file"] {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      margin-top: 6px;
      font: inherit;
      background: #fff;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }

    .actions button { flex: 1; }

    .hint { color: #475569; font-size: 14px; margin-top: 6px; }
    .success-note {
      margin-top: 10px;
      background: #dcfce7;
      color: #166534;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      display: none;
    }

    .final-card {
      text-align: center;
      padding: 8px 0 2px;
    }

    .final-card h3 {
      margin: 0 0 8px;
      color: #14532d;
      font-size: 30px;
    }

    .final-score {
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
      margin: 8px 0 12px;
    }

    @media (max-width: 420px) {
      .modal h2 { font-size: 30px; }
      .modal p { font-size: 21px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">Jornada</div>
      <div class="coins" id="coinsBox">$ 0</div>
    </header>

    <section class="view active" id="view-jornadas">
      <div class="subtitle" id="progressText">Fase atual: 1 de 10</div>

      <section class="track-wrap" id="trackWrap">
        <svg class="track-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <path class="track-path" d="M80,92 C15,89 17,73 50,70 C86,67 86,50 22,46 C8,45 8,31 48,27 C84,24 84,8 20,7" />
        </svg>
      </section>

      <div class="controls">
        <button class="btn-secondary" id="resetBtn">Reiniciar progresso</button>
        <button class="btn-primary" id="openCurrentBtn">Abrir fase atual</button>
        <button class="btn-secondary" id="exportBtn">Exportar respostas (.json)</button>
      </div>
    </section>

    <section class="view" id="view-premios">
      <div class="panel">
        <h3>Loja de premios</h3>
        <p>Use suas moedas para resgatar brindes da palestra.</p>
      </div>
      <div class="prizes-list" id="prizesList"></div>
    </section>

    <section class="view" id="view-perfil">
      <div class="panel">
        <h3>Seu perfil</h3>
        <p>Guarde seus dados e acompanhe seu desempenho.</p>
      </div>
      <div class="panel profile-grid">
        <label>Nome
          <input type="text" id="profileName" placeholder="Seu nome" />
        </label>
        <label>Empresa
          <input type="text" id="profileBusiness" placeholder="Nome da empresa" />
        </label>
        <label>Meta principal
          <textarea id="profileGoal" rows="3" placeholder="Qual sua meta para os proximos 30 dias?"></textarea>
        </label>
        <button class="btn-primary" id="saveProfileBtn">Salvar perfil</button>
        <div class="stats-box" id="profileStats"></div>
      </div>
    </section>
  </div>

  <div class="footer">
    <button type="button" class="nav-btn active" data-tab="jornadas">Jornadas</button>
    <button type="button" class="nav-btn" data-tab="premios">Premios</button>
    <button type="button" class="nav-btn" data-tab="perfil">Perfil</button>
  </div>

  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal" id="challengeModal">
    <h2>Saiba mais</h2>
    <h3 id="challengeTitle">Fase 1</h3>
    <p id="challengeDescription"></p>
    <p class="small" id="rewardText"></p>

    <div id="textAnswerWrap">
      <label for="textAnswer">Sua resposta</label>
      <textarea id="textAnswer" rows="4" placeholder="Digite sua resposta..."></textarea>
    </div>

    <div id="uploadWrap" style="display: none;">
      <label for="fileAnswer">Anexar imagem</label>
      <input id="fileAnswer" type="file" accept="image/*" />
      <div class="hint" id="fileHint">Nenhum arquivo selecionado.</div>
    </div>

    <div class="actions">
      <button class="btn-secondary" id="closeModalBtn">Fechar</button>
      <button class="btn-primary" id="submitChallengeBtn">Enviar resposta</button>
    </div>
    <div class="success-note" id="successNote"></div>
  </div>

  <div class="modal" id="finalModal">
    <h2>Parabens!</h2>
    <div class="final-card">
      <h3>Jornada concluida</h3>
      <p>Voce completou todas as fases com sucesso.</p>
      <div class="final-score" id="finalScoreText"></div>
    </div>
    <div class="actions">
      <button class="btn-secondary" id="closeFinalBtn">Fechar</button>
      <button class="btn-primary" id="exportFinalBtn">Exportar respostas</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "jogoPalestraStateV2";

    const phases = [
      { id: 1, title: "Futuro do neg├│cio", reward: 100, type: "text", description: "Qual a maior oportunidade para o seu neg├│cio crescer nos pr├│ximos meses?" },
      { id: 2, title: "Decis├úo estrat├®gica", reward: 100, type: "text", description: "Como voc├¬ toma decis├Áes importantes hoje e o que poderia melhorar nesse processo?" },
      { id: 3, title: "Desafio da foto", reward: 200, type: "upload", description: "Registre um momento da palestra e envie uma imagem para concluir esta etapa." },
      { id: 4, title: "Automa├º├úo", reward: 100, type: "text", description: "Qual tarefa repetitiva voc├¬ mais gostaria de automatizar no seu neg├│cio?" },
      { id: 5, title: "Cliente ideal", reward: 100, type: "text", description: "Descreva rapidamente o perfil de cliente que mais gera resultado para voc├¬." },
      { id: 6, title: "Meta de curto prazo", reward: 100, type: "text", description: "Qual meta voc├¬ quer atingir em 30 dias e qual primeiro passo dar├í hoje?" },
      { id: 7, title: "Prova social", reward: 200, type: "upload", description: "Anexe uma imagem com depoimento, print ou material que represente sua marca." },
      { id: 8, title: "Indicador principal", reward: 100, type: "text", description: "Qual n├║mero voc├¬ precisa acompanhar toda semana para tomar melhores decis├Áes?" },
      { id: 9, title: "A├º├úo comercial", reward: 100, type: "text", description: "Qual a├º├úo pr├ítica voc├¬ pode aplicar amanh├ú para vender mais?" },
      { id: 10, title: "Compromisso final", reward: 300, type: "text", description: "Qual compromisso voc├¬ assume hoje para continuar evoluindo ap├│s a palestra?" }
    ];

    const nodePositions = [
      { top: 92, left: 80 },
      { top: 86, left: 48 },
      { top: 89, left: 18 },
      { top: 71, left: 25 },
      { top: 69, left: 51 },
      { top: 66, left: 77 },
      { top: 49, left: 82 },
      { top: 43, left: 52 },
      { top: 46, left: 21 },
      { top: 19, left: 22 }
    ];

    const prizes = [
      { id: "bolsa-mk", name: "Bolsa Microkids", cost: 250, emoji: "­ƒæ£", description: "Bolsa exclusiva para materiais da jornada." },
      { id: "estojo-mk", name: "Estojo Microkids", cost: 180, emoji: "­ƒÄÆ", description: "Estojo pratico para o dia a dia." },
      { id: "garrafa", name: "Garrafa termica", cost: 220, emoji: "­ƒº┤", description: "Garrafa premium para cafe ou agua." },
      { id: "camiseta", name: "Camiseta oficial", cost: 300, emoji: "­ƒæò", description: "Camiseta da comunidade de empreendedores." },
      { id: "livro", name: "Livro de negocios", cost: 320, emoji: "­ƒôÿ", description: "Livro inspirador sobre crescimento empresarial." },
      { id: "mentoria", name: "Mini mentoria", cost: 500, emoji: "­ƒºá", description: "Sessao curta de mentoria de estrategia." },
      { id: "alexa", name: "Alexa Echo Dot", cost: 800, emoji: "­ƒöè", description: "Assistente inteligente para automacao." },
      { id: "voucher", name: "Voucher parceiro", cost: 420, emoji: "­ƒÄƒ´©Å", description: "Desconto especial em servicos parceiros." }
    ];

    const trackWrap = document.getElementById("trackWrap");
    const coinsBox = document.getElementById("coinsBox");
    const progressText = document.getElementById("progressText");
    const openCurrentBtn = document.getElementById("openCurrentBtn");
    const resetBtn = document.getElementById("resetBtn");
    const exportBtn = document.getElementById("exportBtn");
    const prizesList = document.getElementById("prizesList");
    const profileName = document.getElementById("profileName");
    const profileBusiness = document.getElementById("profileBusiness");
    const profileGoal = document.getElementById("profileGoal");
    const saveProfileBtn = document.getElementById("saveProfileBtn");
    const profileStats = document.getElementById("profileStats");
    const navButtons = document.querySelectorAll(".nav-btn");
    const views = {
      jornadas: document.getElementById("view-jornadas"),
      premios: document.getElementById("view-premios"),
      perfil: document.getElementById("view-perfil")
    };

    const modalBackdrop = document.getElementById("modalBackdrop");
    const challengeModal = document.getElementById("challengeModal");
    const finalModal = document.getElementById("finalModal");
    const challengeTitle = document.getElementById("challengeTitle");
    const challengeDescription = document.getElementById("challengeDescription");
    const rewardText = document.getElementById("rewardText");
    const textAnswerWrap = document.getElementById("textAnswerWrap");
    const uploadWrap = document.getElementById("uploadWrap");
    const textAnswer = document.getElementById("textAnswer");
    const fileAnswer = document.getElementById("fileAnswer");
    const fileHint = document.getElementById("fileHint");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const submitChallengeBtn = document.getElementById("submitChallengeBtn");
    const successNote = document.getElementById("successNote");
    const finalScoreText = document.getElementById("finalScoreText");
    const closeFinalBtn = document.getElementById("closeFinalBtn");
    const exportFinalBtn = document.getElementById("exportFinalBtn");

    let selectedPhase = null;
    let currentTab = "jornadas";
    let state = loadState();

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { completed: [], coins: 0, answers: {}, spentCoins: 0, unlockedPrizes: [], profile: { name: "", business: "", goal: "" } };
        const parsed = JSON.parse(raw);
        const profile = parsed.profile || {};
        const spentCoins = Math.max(0, Number(parsed.spentCoins) || 0);
        const coins = Math.max(0, Number(parsed.coins) || 0);
        return {
          completed: Array.isArray(parsed.completed) ? parsed.completed : [],
          coins,
          answers: parsed.answers || {},
          spentCoins: spentCoins > coins ? coins : spentCoins,
          unlockedPrizes: Array.isArray(parsed.unlockedPrizes) ? parsed.unlockedPrizes : [],
          profile: {
            name: profile.name || "",
            business: profile.business || "",
            goal: profile.goal || ""
          }
        };
      } catch (err) {
        return { completed: [], coins: 0, answers: {}, spentCoins: 0, unlockedPrizes: [], profile: { name: "", business: "", goal: "" } };
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function getAvailableCoins() {
      return Math.max(0, state.coins - state.spentCoins);
    }

    function getCurrentPhaseId() {
      for (const phase of phases) {
        if (!state.completed.includes(phase.id)) return phase.id;
      }
      return phases[phases.length - 1].id;
    }

    function isLocked(phaseId) {
      const current = getCurrentPhaseId();
      return phaseId > current;
    }

    function phaseStatus(phaseId) {
      if (state.completed.includes(phaseId)) return "done";
      if (phaseId === getCurrentPhaseId()) return "current";
      return "locked";
    }

    function buildNodes() {
      trackWrap.querySelectorAll(".node").forEach((el) => el.remove());

      phases.forEach((phase, idx) => {
        const pos = nodePositions[idx];
        const status = phaseStatus(phase.id);

        const node = document.createElement("button");
        node.className = `node ${status}`;
        node.style.top = `${pos.top}%`;
        node.style.left = `${pos.left}%`;
        node.type = "button";
        node.innerHTML = `${phase.id}<span class="status ${status}">${labelStatus(status)}</span>`;
        node.setAttribute("aria-label", `Fase ${phase.id} - ${status}`);
        node.addEventListener("click", () => onClickPhase(phase.id));

        trackWrap.appendChild(node);
      });
    }

    function labelStatus(status) {
      if (status === "done") return "Concluida";
      if (status === "current") return "Atual";
      return "Bloqueada";
    }

    function onClickPhase(phaseId) {
      if (isLocked(phaseId)) {
        alert("Essa fase ainda esta bloqueada. Conclua as anteriores primeiro.");
        return;
      }
      openPhaseModal(phaseId);
    }

    function openPhaseModal(phaseId) {
      selectedPhase = phases.find((p) => p.id === phaseId);
      if (!selectedPhase) return;

      challengeTitle.textContent = `Fase ${selectedPhase.id} - ${selectedPhase.title}`;
      challengeDescription.textContent = selectedPhase.description;
      rewardText.textContent = `Recompensa: $ ${selectedPhase.reward} moedas`;

      textAnswer.value = "";
      fileAnswer.value = "";
      fileHint.textContent = "Nenhum arquivo selecionado.";
      successNote.style.display = "none";
      successNote.textContent = "";

      if (selectedPhase.type === "upload") {
        textAnswerWrap.style.display = "none";
        uploadWrap.style.display = "block";
      } else {
        textAnswerWrap.style.display = "block";
        uploadWrap.style.display = "none";
      }

      const previous = state.answers[selectedPhase.id];
      if (previous && previous.type === "text") textAnswer.value = previous.value || "";
      if (previous && previous.type === "upload") fileHint.textContent = `Arquivo anterior: ${previous.fileName}`;

      modalBackdrop.style.display = "block";
      challengeModal.style.display = "block";
    }

    function closeModal() {
      selectedPhase = null;
      successNote.style.display = "none";
      successNote.textContent = "";
      modalBackdrop.style.display = "none";
      challengeModal.style.display = "none";
      finalModal.style.display = "none";
    }

    function openFinalModal() {
      finalScoreText.textContent = `Total: $ ${state.coins} | Saldo: $ ${getAvailableCoins()}`;
      modalBackdrop.style.display = "block";
      finalModal.style.display = "block";
    }

    function getNextPhaseId(currentId) {
      const next = currentId + 1;
      if (next > phases.length) return null;
      return next;
    }

    function exportAnswers() {
      const payload = {
        exportedAt: new Date().toISOString(),
        summary: {
          completedCount: state.completed.length,
          totalPhases: phases.length,
          coinsEarned: state.coins,
          coinsSpent: state.spentCoins,
          coinsAvailable: getAvailableCoins()
        },
        profile: state.profile,
        prizes: {
          unlocked: state.unlockedPrizes
        },
        answers: state.answers
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "respostas-jornada.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    function buildPrizes() {
      prizesList.innerHTML = "";
      prizes.forEach((prize) => {
        const unlocked = state.unlockedPrizes.includes(prize.id);
        const canBuy = getAvailableCoins() >= prize.cost && !unlocked;

        const card = document.createElement("div");
        card.className = "prize-card";
        card.innerHTML = `
          <div class="prize-top">
            <div class="prize-title">${prize.emoji} ${prize.name}</div>
            <div class="prize-price">$ ${prize.cost}</div>
          </div>
          <p>${prize.description}</p>
          <div class="prize-actions">
            <button class="${unlocked ? "btn-secondary" : "btn-primary"}" data-prize-id="${prize.id}" ${unlocked ? "disabled" : ""}>
              ${unlocked ? "Resgatado" : (canBuy ? "Resgatar" : "Faltam moedas")}
            </button>
          </div>
        `;
        prizesList.appendChild(card);
      });

      prizesList.querySelectorAll("button[data-prize-id]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const prizeId = btn.getAttribute("data-prize-id");
          buyPrize(prizeId);
        });
      });
    }

    function buyPrize(prizeId) {
      const prize = prizes.find((item) => item.id === prizeId);
      if (!prize) return;
      if (state.unlockedPrizes.includes(prize.id)) return;

      if (getAvailableCoins() < prize.cost) {
        alert("Voce nao tem moedas suficientes para este premio.");
        return;
      }

      state.unlockedPrizes.push(prize.id);
      state.spentCoins += prize.cost;
      saveState();
      render();
      alert(`Premio resgatado: ${prize.name}!`);
    }

    function renderProfile() {
      profileName.value = state.profile.name;
      profileBusiness.value = state.profile.business;
      profileGoal.value = state.profile.goal;

      const unlockedCount = state.unlockedPrizes.length;
      const achievement = state.completed.length === phases.length ? "Jornada finalizada" : "Jornada em andamento";
      profileStats.innerHTML = `
        <div>Moedas ganhas: <strong>$ ${state.coins}</strong></div>
        <div>Moedas gastas: <strong>$ ${state.spentCoins}</strong></div>
        <div>Saldo atual: <strong>$ ${getAvailableCoins()}</strong></div>
        <div>Premios resgatados: <strong>${unlockedCount}</strong></div>
        <div>Status: <strong>${achievement}</strong></div>
      `;
    }

    function saveProfile() {
      state.profile = {
        name: profileName.value.trim(),
        business: profileBusiness.value.trim(),
        goal: profileGoal.value.trim()
      };
      saveState();
      renderProfile();
      alert("Perfil salvo com sucesso!");
    }

    function setTab(tabName) {
      currentTab = tabName;
      Object.keys(views).forEach((key) => {
        views[key].classList.toggle("active", key === tabName);
      });
      navButtons.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.tab === tabName);
      });
      if (tabName === "premios") buildPrizes();
      if (tabName === "perfil") renderProfile();
    }

    function completePhase() {
      if (!selectedPhase) return;
      const alreadyDone = state.completed.includes(selectedPhase.id);

      if (selectedPhase.type === "text") {
        const value = textAnswer.value.trim();
        if (!value) {
          alert("Digite uma resposta para concluir.");
          return;
        }
        state.answers[selectedPhase.id] = { type: "text", value };
      } else {
        const file = fileAnswer.files[0];
        if (!file && !state.answers[selectedPhase.id]) {
          alert("Selecione uma imagem para concluir.");
          return;
        }
        if (file) {
          state.answers[selectedPhase.id] = { type: "upload", fileName: file.name };
        }
      }

      if (!alreadyDone) {
        state.completed.push(selectedPhase.id);
        state.coins += selectedPhase.reward;
      }

      saveState();
      render();
      successNote.style.display = "block";

      if (state.completed.length === phases.length) {
        setTimeout(() => {
          closeModal();
          openFinalModal();
        }, 900);
        return;
      }

      const nextPhaseId = getNextPhaseId(selectedPhase.id);
      successNote.textContent = "Resposta enviada! Abrindo proxima fase...";
      setTimeout(() => {
        closeModal();
        if (nextPhaseId) openPhaseModal(nextPhaseId);
      }, 900);
    }

    function render() {
      coinsBox.textContent = `$ ${getAvailableCoins()}`;
      const current = getCurrentPhaseId();
      progressText.textContent = `Fase atual: ${current} de ${phases.length} | Concluidas: ${state.completed.length}`;
      buildNodes();
      if (currentTab === "premios") buildPrizes();
      if (currentTab === "perfil") renderProfile();
    }

    openCurrentBtn.addEventListener("click", () => openPhaseModal(getCurrentPhaseId()));
    exportBtn.addEventListener("click", exportAnswers);
    saveProfileBtn.addEventListener("click", saveProfile);
    navButtons.forEach((btn) => {
      btn.addEventListener("click", () => setTab(btn.dataset.tab));
    });
    resetBtn.addEventListener("click", () => {
      const ok = confirm("Deseja apagar todo o progresso desta jornada?");
      if (!ok) return;
      state = {
        completed: [],
        coins: 0,
        answers: {},
        spentCoins: 0,
        unlockedPrizes: [],
        profile: { ...state.profile }
      };
      saveState();
      render();
    });
    closeModalBtn.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", closeModal);
    submitChallengeBtn.addEventListener("click", completePhase);
    closeFinalBtn.addEventListener("click", closeModal);
    exportFinalBtn.addEventListener("click", exportAnswers);
    fileAnswer.addEventListener("change", () => {
      const file = fileAnswer.files[0];
      fileHint.textContent = file ? `Arquivo selecionado: ${file.name}` : "Nenhum arquivo selecionado.";
    });

    setTab("jornadas");
    render();
  </script>
</body>
</html>
